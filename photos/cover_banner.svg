<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Base Background -->
  <rect width="1000" height="420" fill="#050a06"/>
  
  <defs>
    <!-- Sharper Botanical Pattern -->
    <pattern id="veins" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M0 50 Q 25 25 50 50 T 100 50" stroke="#22c55e" stroke-width="0.8" fill="none" opacity="0.15"/>
      <path d="M50 0 Q 75 25 50 50 T 50 100" stroke="#22c55e" stroke-width="0.8" fill="none" opacity="0.1"/>
    </pattern>
    
    <!-- Circular Logo Glow -->
    <radialGradient id="logoRadialGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.4"/>
      <stop offset="70%" stop-color="#22c55e" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#22c55e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background Pattern -->
  <rect width="1000" height="420" fill="url(#veins)"/>
  
  <!-- Organic Flow Lines (Simplified for cleaner look) -->
  <path d="M-100 350 C 200 150 400 500 700 250 S 1100 300 1200 100" stroke="#4ade80" stroke-width="1.5" fill="none" opacity="0.1"/>
  <path d="M-50 50 C 300 400 600 -100 1050 350" stroke="#4ade80" stroke-width="1" fill="none" opacity="0.08"/>

  <!-- Centered Content Group -->
  <g transform="translate(500, 210)">
    <!-- Radial Glow centered behind the logo -->
    <circle cx="-220" cy="0" r="180" fill="url(#logoRadialGlow)"/>
    
    <!-- Logo Icon Group -->
    <g transform="translate(-320, -100) scale(6.25)">
      <rect width="32" height="32" rx="8" fill="#15803d"/>
      <path d="M16 8C12 12 10 16 10 20C10 23.3137 12.6863 26 16 26C19.3137 26 22 23.3137 22 20C22 16 20 12 16 8Z" fill="white"/>
      <path d="M16 14V26" stroke="#15803d" stroke-width="2" stroke-linecap="round"/>
    </g>
    
    <!-- Text Content -->
    <text fill="white" font-family="Inter, system-ui, sans-serif" font-size="76" font-weight="900" letter-spacing="-0.02em" text-anchor="start">
      <tspan x="-80" y="10">NatureNode</tspan>
    </text>
    <text fill="#86efac" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="600" letter-spacing="0.25em" text-anchor="start">
      <tspan x="-77" y="50">BIODIVERSITY RESEARCH TOOL</tspan>
    </text>
  </g>

  <!-- Global subtle vignetting -->
  <rect width="1000" height="420" fill="url(#globalVignette)" pointer-events="none"/>
  <defs>
    <radialGradient id="globalVignette" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#050a06" stop-opacity="0"/>
      <stop offset="100%" stop-color="#050a06" stop-opacity="0.4"/>
    </radialGradient>
  </defs>
</svg>
